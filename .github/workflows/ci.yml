name: CI
on:
  workflow_call:
    inputs:
      appName:
        required: true
        type: string
      apptype:
        required: true
        type: string

jobs:
  build:
    runs-on: self-hosted
    # Only run build if it's a maven app
    if: ${{ inputs.apptype == 'maven' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build with Maven
        if: ${{ inputs.apptype == 'maven' }}
        run: mvn clean package
      - name: upload artifact
        if: ${{ inputs.apptype == 'maven' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.appName }}-jar
          path: target/${{ inputs.appName }}-1.0.jar
  test:

    runs-on: self-hosted
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      # Runs a set of commands using the runners shell
      - name: Run ${{ inputs.apptype }} test
        run: echo ${{ inputs.apptype }} test
  docker:
    needs: test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: docker login
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/u4j6q5s8
      - uses: actions/download-artifact@v4
        if: ${{ inputs.appName == 'maven' }}
        with:
          name: shipping-jar
          path: ./
      - name: build docker image
        run: docker build -t public.ecr.aws/u4j6q5s8/${{ inputs.appName }}:v1 .
      - name: push to aws ecr
        run: docker push public.ecr.aws/u4j6q5s8/${{ inputs.appName }}:v1

  dev:
    needs: docker
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          repository: pdevops87/roboshop-helm-v3-final

      - name: Connect to EKS
        run: aws eks update-kubeconfig --name dev-eks

      - name: Wait for LoadBalancer DNS
        run: |
          LB_HOST=$(kubectl get svc argocd-server -o jsonpath="{.status.loadBalancer.ingress[0].hostname}")
          echo "Waiting for $LB_HOST ..."
          
          while ! nslookup "$LB_HOST" &>>/dev/null; do
           echo "Waiting for LB DNS..."
            sleep 10
          done
          
          echo "LB_HOST=$LB_HOST" >> $GITHUB_ENV # Save variables in Github env
          echo "$LB_HOST is ready!"

      - name: ArgoCD Login
        run: |
          # Fetch password and login using the saved LB_HOST
          ARGOCD_PASS=$(kubectl get secrets argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 --decode)
          argocd login ${{ env.LB_HOST }} --insecure --username admin --password $ARGOCD_PASS

      - name: Create and Sync ArgoCD App
        run: |
          argocd app create ${{ inputs.appName }} \
            --repo https://github.com/pdevops87/roboshop-helm-v3-final.git \
            --path . \
            --dest-namespace default \
            --dest-server https://kubernetes.default.svc \
            --values pass-to-templates/${{ inputs.appName }}.yaml \
            --upsert
          argocd app sync ${{ inputs.appName }}







