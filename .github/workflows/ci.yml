name: CI
on:
  workflow_call:
    inputs:
      appName:
        required: true
        type: string
      apptype:
        required: true
        type: string

jobs:
  build:
    runs-on: self-hosted
    # Only run build if it's a maven app
    if: ${{ inputs.apptype == 'maven' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build with Maven
        if: ${{ inputs.apptype == 'maven' }}
        run: mvn clean package
      - name: upload artifact
        if: ${{ inputs.apptype == 'maven' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.appName }}-jar
          path: target/${{ inputs.appName }}-1.0.jar
  test:

    runs-on: self-hosted
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      # Runs a set of commands using the runners shell
      - name: Run ${{ inputs.apptype }} test
        run: echo ${{ inputs.apptype }} test
  docker:
    needs: test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
      
      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
         registry-type: public
      - name: docker login
        run: |
          echo login to ecr
          aws ecr-public get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin public.ecr.aws/u4j6q5s8
      - uses: actions/download-artifact@v4
        if: ${{ inputs.appName == 'maven' }}
        with:
          name: shipping-jar
          path: ./
      - name: build docker image
        run: docker build -t public.ecr.aws/u4j6q5s8/${{ inputs.appName }}:v1 .
      - name: push to aws ecr
        run: docker push public.ecr.aws/u4j6q5s8/${{ inputs.appName }}:v1

