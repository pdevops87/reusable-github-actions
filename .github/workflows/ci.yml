name: CI
on:
  workflow_call:
    inputs:
      appName:
        required: true
        type: string
      apptype:
        required: true
        type: string

jobs:
  build:
    runs-on: self-hosted
    # Only run build if it's a maven app
    if: ${{ inputs.apptype == 'maven' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build with Maven
        if: ${{ inputs.apptype == 'maven' }}
        run: mvn clean package
      - name: upload artifact
        if: ${{ inputs.apptype == 'maven' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.appName }}-jar
          path: target/${{ inputs.appName }}-1.0.jar
  test:

    runs-on: self-hosted
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      # Runs a set of commands using the runners shell
      - name: Run ${{ inputs.apptype }} test
        run: echo ${{ inputs.apptype }} test
  docker:
    needs: test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
#      - name: Configure AWS Credentials via Keys
#        uses: aws-actions/configure-aws-credentials@v4
#        with:
#          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
#          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
#          aws-region: us-east-1
      - name: Run Docker Login with Secrets
        env:
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/u4j6q5s8
      - uses: actions/download-artifact@v4
        if: ${{ inputs.appName == 'maven' }}
        with:
          name: shipping-jar
          path:  ./
      - name: build docker image
        run: docker build -t public.ecr.aws/u4j6q5s8/${{ inputs.appName }}:v1 .
      - name: push to aws ecr
        run: docker push public.ecr.aws/u4j6q5s8/${{ inputs.appName }}:v1
  dev:
   needs: docker
   runs-on: self-hosted
   steps:
     - uses: actions/checkout@v4
       with:
        repository: pdevops87/roboshop-helm-v3-final

     - name: Connect to EKS
       run: aws eks update-kubeconfig --name dev-cluster



