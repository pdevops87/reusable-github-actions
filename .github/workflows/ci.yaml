# This is a basic workflow to help you get started with Actions

name: shipping

# Controls when the workflow will run
on:
  workflow_call:
    inputs:
      appName:
        required: true
        type: string
  # Triggers the workflow on push or pull request events but only for the "main" branch
jobs:

  build:
    runs-on: self-hosted
    if: github.ref == 'maven'
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      # Runs a set of commands using the runners shell
      - name: Build with Maven
        run: mvn clean package
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.appName }}-jar
          path: target/${{ inputs.appName }}-1.0.jar
  test:
    runs-on: self-hosted
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      # Runs a set of commands using the runners shell
      - name: Run ${{ inputs.toolName }} test
        run: echo ${{ inputs.toolName }} test
  docker:
    needs: test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: docker login
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/u4j6q5s8
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.appName }}-jar
          path: ./
      - name: build docker image
        run: docker build -t public.ecr.aws/u4j6q5s8/${{ inputs.appName }}:v1 .
      - name: push to aws ecr
        run: docker push public.ecr.aws/u4j6q5s8/${{ inputs.appName }}:v1
  dev:
    needs: docker
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          repository: pdevops87/roboshop-helm-v1
      - name: connect to kubernetes api through kubeconfig
        run:  echo aws eks update-kubeconfig --name dev
      - name: deploy app
        run: echo helm upgrade -i ${{ inputs.appName }} -f pass-values-templates/${{ inputs.appName }}.yaml







